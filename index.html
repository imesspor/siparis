<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok & Sipariş Takip Pro</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/kV5hBdbW/1.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --proforce-color: #00a859;
            --panatta-color: #e63946;
            --bg-main: #f4f6f9;
            --bg-white: #ffffff;
            --slicer-bg: #eef1f6;
            --border-color: #dde2ec;
            --border-light: #eaecf2;
            --accent-blue: #3b5bdb;
            --accent-blue-light: #eef2ff;
            --accent-purple: #7950f2;
            --text-dark: #1a1f36;
            --text-mid: #4a5568;
            --text-muted: #8a94a6;
            --shadow-sm: 0 1px 4px rgba(60,70,100,0.08);
            --shadow-md: 0 4px 16px rgba(60,70,100,0.12);
            --radius: 8px;
        }

        * { box-sizing: border-box; }

        body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background-color: var(--bg-main); margin: 0; padding: 6px; color: var(--text-dark); font-weight: 500; }
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 6px; background: var(--bg-white); padding: 6px 16px; border-radius: var(--radius); box-shadow: var(--shadow-sm); gap: 8px; border: 1px solid var(--border-color); }
        .upload-section { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .hidden-input { display: none; }
        .btn-action { border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; color: white; transition: all 0.15s; letter-spacing: 0.3px; }
        .btn-action:hover { opacity: 0.85; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .btn-data { background: linear-gradient(135deg, #3b5bdb, #4c6ef5); }
        .btn-notes { background: linear-gradient(135deg, #7950f2, #9775fa); }
        .btn-report { background: linear-gradient(135deg, #2d3436, #4a5568); }
        .file-name-display { font-size: 10px; color: var(--text-muted); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; }
        .brand-tabs { display: flex; gap: 5px; }
        .tab-btn { padding: 4px 14px; border: 2px solid transparent; cursor: pointer; font-weight: 800; border-radius: 6px; color: white; font-size: 11px; opacity: 0.45; transition: all 0.2s; letter-spacing: 0.5px; }
        .tab-btn.proforce { background: var(--proforce-color); }
        .tab-btn.panatta { background: var(--panatta-color); }
        .tab-btn.active { opacity: 1; border-color: rgba(0,0,0,0.2); box-shadow: var(--shadow-sm); }
        .slicer-wrapper { background: var(--bg-white); padding: 6px; border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 6px; box-shadow: var(--shadow-sm); }
        #slicer-area { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 4px; align-items: center; }
        .slicer-btn { height: 27px; background: var(--bg-main); border: 1px solid var(--border-color); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 5px; transition: all 0.15s; color: var(--text-mid); text-align: center; letter-spacing: 0.2px; }
        .slicer-btn:hover { background: var(--accent-blue-light); color: var(--accent-blue); border-color: #c5d0ff; }
        .slicer-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); box-shadow: 0 2px 6px rgba(59,91,219,0.3); }
        .search-container-in-slicer { display: flex; align-items: center; background: var(--bg-white); border: 1.5px solid var(--accent-blue); border-radius: 6px; padding: 0; height: 29px; grid-column: span 3; position: relative; overflow: visible; box-shadow: 0 0 0 3px rgba(59,91,219,0.08); }
        .search-input { flex: 1; border: none; outline: none; font-size: 11px; font-weight: 600; padding: 0 10px; color: var(--accent-blue); background: transparent; font-family: inherit; }
        .search-input::placeholder { color: var(--text-muted); font-weight: 500; }
        .btn-customer-trigger { background: var(--accent-blue); height: 100%; padding: 0 14px; border: none; color: white; font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; border-radius: 0 4px 4px 0; font-family: inherit; }
        .btn-customer-trigger:hover { background: #2f4ac0; }
        .customer-dropdown { position: absolute; top: 34px; right: 0; background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 10px; box-shadow: var(--shadow-md); z-index: 1000; min-width: 320px; display: none; flex-direction: column; }
        .cust-search-wrapper { padding: 10px; border-bottom: 1px solid var(--border-light); background: var(--bg-main); border-radius: 10px 10px 0 0; }
        .cust-inner-search { width: 100%; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 11px; box-sizing: border-box; font-family: inherit; outline: none; }
        .cust-inner-search:focus { border-color: var(--accent-blue); }
        .customer-list-area { max-height: 350px; overflow-y: auto; }
        .customer-item { padding: 8px 12px; font-size: 11px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); }
        .customer-item:hover { background: var(--accent-blue-light); }
        .customer-name { flex: 1; padding-right: 10px; font-weight: 700; color: var(--text-dark); }
        .cust-actions { display: flex; gap: 4px; }
        .btn-cust-preview { background: var(--accent-purple); color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 9px; cursor: pointer; font-weight: 700; font-family: inherit; }
        .btn-cust-download { background: var(--proforce-color); color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 9px; cursor: pointer; font-weight: 700; font-family: inherit; }
        .table-container { background: var(--bg-white); border-radius: var(--radius); border: 1px solid var(--border-color); overflow-x: auto; max-height: 78vh; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; table-layout: auto; }
        thead { background: linear-gradient(to bottom, #f8faff, #eef1f8); position: sticky; top: 0; z-index: 10; }
        th { padding: 5px 6px; border: 1px solid var(--border-light); font-size: 10px; white-space: nowrap; height: 22px; text-align: center; font-weight: 800; color: var(--text-mid); letter-spacing: 0.4px; text-transform: uppercase; }
        td { padding: 2px 5px; border: 1px solid var(--border-light); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; height: 20px; text-align: center; font-weight: 600; color: var(--text-dark); }
        .col-stok-adi { text-align: left !important; padding-left: 6px; cursor: pointer; color: var(--accent-blue) !important; }
        .col-stok-adi:hover { text-decoration: underline; }
        .col-fiili { background-color: #fff8f0 !important; }
        .col-satis { background-color: #fffbea !important; }
        .col-kalan { background-color: #f6fff0 !important; }
        .col-ithalat { background-color: #f0fff6 !important; }
        .col-manuel { background-color: #f0fbff !important; color: #2980b9; cursor: pointer; }
        .manuel-input { width: 50px; border: 1.5px solid var(--accent-blue); border-radius: 4px; text-align: center; font-size: 11px; font-weight: 700; color: var(--accent-blue); background: #f0f6ff; padding: 0; outline: none; font-family: inherit; }
        .col-avg { background-color: #f0f7ff !important; }
        .col-omur { background-color: #faf0ff !important; }
        .col-oneri { background-color: #fffdf0 !important; }
        .col-stok-durumu { background-color: #f8f9fc !important; font-size: 10px !important; }
        .critical-row td { color: #e63946 !important; font-weight: 800 !important; }
        tr:hover td { background-color: #f5f8ff !important; }
        .w-sort { width: 25px; cursor: move; color: var(--border-color); text-align: center; font-size: 16px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,31,54,0.45); display: none; z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--bg-white); padding: 24px; border-radius: 12px; width: 480px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); }
        .cust-link { color: var(--accent-blue); text-decoration: underline; cursor: pointer; font-weight: 700; }
        .cust-link:hover { color: var(--panatta-color); }
        .preview-modal { width: 90% !important; max-width: 800px; }
        .preview-table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .preview-table th, .preview-table td { padding: 4px 4px; border: 1px solid var(--border-light); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
        .preview-table th { background: var(--bg-main); font-weight: 800; color: var(--text-mid); }
        .preview-table td:nth-child(3) { text-align: left; padding-left: 5px; }
        .preview-table th:nth-child(1) { width: 80px; }
        .preview-table th:nth-child(2) { width: 120px; }
        .preview-table th:nth-child(3) { width: auto; }
        .preview-table th:nth-child(4), .preview-table th:nth-child(5), .preview-table th:nth-child(6) { width: 60px; }
        .modal-header { border-bottom: 2px solid var(--accent-blue-light); margin-bottom: 16px; padding-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--text-dark); }
        .modal-close { cursor: pointer; font-size: 22px; line-height: 1; font-weight: 400; color: var(--text-muted); transition: color 0.15s; }
        .modal-close:hover { color: var(--panatta-color); }
        .info-row { padding: 3px 0 !important; margin: 0 !important; font-size: 11px !important; border-bottom: 1px solid var(--border-light); line-height: 1.6; }
        .modal-section h4 { margin-top: 10px !important; margin-bottom: 5px !important; color: var(--text-mid); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .product-image { width: auto; max-width: 250px; max-height: 200px; display: block; margin: 0 auto 15px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-main); }
        .btn-excel-cust-big { background: var(--proforce-color); color: white; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; margin-bottom: 10px; font-family: inherit; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b0bbd4; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="upload-section" style="flex:1;">
            <img src="https://i.ibb.co/kV5hBdbW/1.png" alt="Logo" style="height:32px; width:auto; object-fit:contain; margin-right:6px;">
            <button class="btn-action btn-data" onclick="document.getElementById('excel-file').click()">📂 VERİYİ YÜKLE</button>
            <input type="file" id="excel-file" class="hidden-input" accept=".xlsx, .xlsm">
            <span id="data-name" class="file-name-display"></span>
            <button class="btn-action btn-report" onclick="downloadReport()">📥 ÜRÜN RAPORU AL</button>
            <button class="btn-action btn-notes" onclick="downloadCurrentSort()">📤 BİLGİLERİ DIŞARI AKTAR</button>
            <button class="btn-action btn-notes" onclick="document.getElementById('notes-file').click()">📝 BİLGİLERİ İÇERİ AL</button>
            <input type="file" id="notes-file" class="hidden-input" accept=".xlsx">
            <span id="notes-name" class="file-name-display"></span>
        </div>

        <div class="brand-tabs">
            <button id="btn-proforce" class="tab-btn proforce active" onclick="switchBrand('PROFORCE')">PROFORCE</button>
            <button id="btn-panatta" class="tab-btn panatta" onclick="switchBrand('PANATTA')">PANATTA</button>
        </div>
    </div>

    <div class="slicer-wrapper">
        <div id="slicer-area"></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 25px;">#</th>
                    <th style="width: 85px;">STOK KODU</th>
                    <th style="width: auto;">STOK ADI</th>
                    <th style="width: 70px;">FİYAT</th>
                    <th class="col-fiili" style="width: 55px;">FİİLİ</th>
                    <th class="col-satis" style="width: 55px;">SATIŞ</th>
                    <th class="col-kalan" style="width: 55px;">KALAN</th>
                    <th class="col-ithalat" style="width: 60px;">İTHALAT</th>
                    <th class="col-manuel" style="width: 70px;">SİPARİŞ</th>
                    <th class="col-avg" style="width: 80px;">AYLIK ORT.</th>
                    <th class="col-omur" style="width: 80px;">STOK ÖMRÜ</th>
                    <th class="col-oneri" style="width: 80px;">SİP. ÖNERİ</th>
                    <th class="col-stok-durumu" style="width: 120px;">STOK DURUMU</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="info-modal" class="modal-overlay" onclick="closeModal(event, 'info-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modal-title">Ürün Detayı</span>
                <span class="modal-close" onclick="document.getElementById('info-modal').style.display='none'">&times;</span>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="preview-modal" class="modal-overlay" onclick="closeModal(event, 'preview-modal')">
        <div class="modal-content preview-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="preview-title">Müşteri Sipariş Önizleme</span>
                <span class="modal-close" onclick="document.getElementById('preview-modal').style.display='none'">&times;</span>
            </div>
            <div id="preview-body"></div>
        </div>
    </div>

<script>
    let allData = [];
    let currentBrand = 'PROFORCE'; 
    let currentFilter = 'HEPSİ';
    let sortableRows = null;

    function formatCurrency(val) {
        if (isNaN(val) || val === null || val === '') return '0,00';
        return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    }

    function excelDateToJS(serial) {
        if(!serial || isNaN(serial)) return serial || "";
        let date = new Date(Math.round((serial - 25569) * 86400 * 1000));
        return `${date.getDate().toString().padStart(2, '0')}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getFullYear()}`;
    }

    let manuelSiparisMap = JSON.parse(localStorage.getItem('manuelSiparisData') || '{}');
    let slicerOrderMap = JSON.parse(localStorage.getItem('slicerOrderData') || '{}');

    function saveSlicerOrder(brand, orderedCats) {
        slicerOrderMap[brand] = orderedCats;
        localStorage.setItem('slicerOrderData', JSON.stringify(slicerOrderMap));
    }

    function getOrderedCategories(brand, rawCats) {
        const saved = slicerOrderMap[brand];
        if (!saved || saved.length === 0) return rawCats;
        const ordered = saved.filter(c => rawCats.includes(c));
        rawCats.forEach(c => { if (!ordered.includes(c)) ordered.push(c); });
        return ordered;
    }

    function cleanLabel(cat) {
        return cat.replace(/^\d+-/, '');
    }

    function saveManuelSiparisMap() {
        localStorage.setItem('manuelSiparisData', JSON.stringify(manuelSiparisMap));
    }

    function applyManuelSiparisToData() {
        allData.forEach(item => {
            if (manuelSiparisMap[item.stokKodu] !== undefined) {
                item.manuelSiparis = manuelSiparisMap[item.stokKodu];
            }
        });
    }

    function editManuelSiparis(td, stokKodu) {
        const item = allData.find(d => d.stokKodu === stokKodu);
        if (!item) return;
        const mevcutDeger = item.manuelSiparis || 0;
        td.innerHTML = `<input class="manuel-input" type="number" value="${mevcutDeger}">`;
        const input = td.querySelector('input');
        input.focus();
        input.select();
        function kaydet() {
            const yeni = parseInt(input.value) || 0;
            item.manuelSiparis = yeni;
            manuelSiparisMap[stokKodu] = yeni;
            saveManuelSiparisMap();
            localStorage.setItem('masterInventoryData', JSON.stringify(allData));
            td.innerHTML = yeni;
        }
        input.addEventListener('blur', kaydet);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') { td.innerHTML = mevcutDeger; }
        });
    }

    window.onload = function() {
        const savedData = localStorage.getItem('masterInventoryData');
        if (savedData) {
            allData = JSON.parse(savedData);
            applyManuelSiparisToData();
            switchBrand(currentBrand);
        }
    };

    document.getElementById('excel-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('data-name').textContent = file.name;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const workbook = XLSX.read(evt.target.result, {type: 'binary'});
            const wsStok = workbook.Sheets["ANLIK_STOK_DATA"];
            if(!wsStok) return alert("ANLIK_STOK_DATA sayfası bulunamadı!");
            const stokJson = XLSX.utils.sheet_to_json(wsStok, {header: "A", defval: ""});
            
            const wsGorsel = workbook.Sheets["GÖRSEL"];
            const resimMap = new Map();
            if(wsGorsel) {
                const gorselJson = XLSX.utils.sheet_to_json(wsGorsel, {header: "A", defval: ""});
                gorselJson.slice(1).forEach(row => {
                    const gKodu = String(row.A || '').trim();
                    const gLink = String(row.C || '').trim();
                    if(gKodu) resimMap.set(gKodu, gLink);
                });
            }

            const wsGecmis = workbook.Sheets["GEÇMİŞ SATIŞ"];
            const satisAnalizMap = new Map();
            if(wsGecmis) {
                const gecmisJson = XLSX.utils.sheet_to_json(wsGecmis, {header: "A", defval: 0});
                gecmisJson.slice(1).forEach(row => {
                    const kodu = String(row.A || '').trim();
                    if(!kodu) return;
                    let satislar = [];
                    let toplamSatisVaktiBoyunca = 0;
                    let baslangicBulundu = false;
                    for(let i = 2; i <= 26; i++) {
                        let sutunHarfi = i <= 25 ? String.fromCharCode(65 + i) : "AA";
                        let val = parseFloat(row[sutunHarfi]) || 0;
                        toplamSatisVaktiBoyunca += val;
                        if(val > 0) baslangicBulundu = true;
                        if(baslangicBulundu) satislar.push(val);
                    }
                    if(satislar.length > 0) {
                        const toplamSatis = satislar.reduce((a, b) => a + b, 0);
                        satisAnalizMap.set(kodu, { 
                            ortalama: toplamSatis / satislar.length, 
                            aktifAy: satislar.length,
                            totalSatis: toplamSatisVaktiBoyunca 
                        });
                    } else {
                        satisAnalizMap.set(kodu, { ortalama: 0, aktifAy: 0, totalSatis: 0 });
                    }
                });
            }

            const wsSiparis = workbook.Sheets["ALINAN SİPARİŞLER DETAY"];
            const siparisMap = new Map();
            if(wsSiparis) {
                const siparisJson = XLSX.utils.sheet_to_json(wsSiparis, {header: "A", defval: ""});
                siparisJson.slice(1).forEach(row => {
                    const sKodu = String(row.L || '').trim();
                    const sMusteri = String(row.J || '').trim();
                    const sAdet = String(row.R || '').trim();
                    // J sütunundaki müşteriye göre C sütunundan tarih bilgisini çekiyoruz
                    const sTarih = excelDateToJS(row.C); 
                    
                    if(sKodu && sMusteri) {
                        if(!siparisMap.has(sKodu)) siparisMap.set(sKodu, []);
                        siparisMap.get(sKodu).push({ 
                            musteri: sMusteri, 
                            adet: sAdet, 
                            tarih: sTarih,
                            rawDate: row.C 
                        });
                    }
                });
                siparisMap.forEach((list) => {
                    list.sort((a, b) => (a.rawDate || 0) - (b.rawDate || 0));
                });
            }

            const wsVerilen = workbook.Sheets["VERİLEN SİPARİŞ DETAY"];
            const ithalatMap = new Map();
            if(wsVerilen) {
                const verilenJson = XLSX.utils.sheet_to_json(wsVerilen, {header: "A", defval: ""});
                const gruplanmisIthalat = {}; 
                verilenJson.slice(1).forEach(row => {
                    const vKodu = String(row.M || '').trim();
                    const vTarih = excelDateToJS(row.R);
                    const vMiktar = parseInt(row.S) || 0;
                    if(vKodu && vTarih) {
                        const key = `${vKodu}_${vTarih}`;
                        if(!gruplanmisIthalat[key]) gruplanmisIthalat[key] = { kodu: vKodu, tarih: vTarih, miktar: 0 };
                        gruplanmisIthalat[key].miktar += vMiktar;
                    }
                });
                Object.values(gruplanmisIthalat).forEach(item => {
                    if(!ithalatMap.has(item.kodu)) ithalatMap.set(item.kodu, []);
                    ithalatMap.get(item.kodu).push(`${item.miktar} Adet → ${item.tarih}`);
                });
            }

            const uniqueIncomingData = new Map();
            stokJson.slice(1).forEach(r => {
                const kodu = String(r.A || '').trim();
                if (kodu === "" || kodu.toLowerCase() === "stok kodu") return;
                const analiz = satisAnalizMap.get(kodu) || { ortalama: 0, aktifAy: 0, totalSatis: 0 };
                const fiili = parseInt(r.H) || 0;
                const ithalat = parseInt(r.K) || 0;
                const eldekiToplam = fiili + ithalat;
                const hedefStok = analiz.ortalama * 5;
                
                let durum = "DİĞER";
                let renk = "#333";
                if(fiili > 0 && analiz.totalSatis === 0) { durum = "🛑 DURAN STOK"; renk = "#e74c3c"; }
                else if(analiz.ortalama > 5) { durum = "⭐ HIZLI SİRKÜLASYON"; renk = "#2ecc71"; }
                else if(analiz.ortalama >= 2) { durum = "📈 NORMAL"; renk = "#3498db"; }
                else if(analiz.ortalama > 0) { durum = "⏳ YAVAŞ HAREKET"; renk = "#f39c12"; }

                uniqueIncomingData.set(kodu, {
                    stokKodu: kodu,
                    stokAdi: String(r.B || ''),
                    marka: String(r.C || '').toUpperCase(),
                    ozelKod5: String(r.F || 'DİĞER'),
                    fiyat: parseFloat(String(r.G).replace(',', '.')) || 0,
                    fiili: fiili,
                    satis: parseInt(r.I) || 0,
                    kalan: parseInt(r.J) || 0,
                    ithalat: ithalat,
                    resim: resimMap.get(kodu) || '', 
                    ithalatDetay: (ithalatMap.get(kodu) || []).join('\n'), 
                    satisListesi: siparisMap.get(kodu) || [],
                    depoL: parseInt(r.L) || 0,
                    depoN: parseInt(r.N) || 0,
                    depoO: parseInt(r.O) || 0,
                    depoP: parseInt(r.P) || 0,
                    avgSatis: analiz.ortalama,
                    totalSatis: analiz.totalSatis,
                    stokOmru: analiz.ortalama > 0 ? (eldekiToplam / analiz.ortalama).toFixed(1) : "0.0",
                    ihtiyacAdet: hedefStok > eldekiToplam ? Math.ceil(hedefStok - eldekiToplam) : 0,
                    stokDurumu: durum,
                    stokDurumuRenk: renk
                });
            });

            const masterMap = new Map(allData.map(item => [item.stokKodu, item]));
            uniqueIncomingData.forEach((newItem, kodu) => {
                if (masterMap.has(kodu)) {
                    const existingItem = masterMap.get(kodu);
                    newItem.manuelSiparis = existingItem.manuelSiparis || 0;
                    Object.assign(existingItem, newItem);
                } else {
                    newItem.manuelSiparis = 0;
                    masterMap.set(kodu, newItem);
                }
            });

            allData = Array.from(masterMap.values());
            applyManuelSiparisToData();
            saveAndRender();
        };
        reader.readAsBinaryString(file);
    });

    document.getElementById('notes-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            const workbook = XLSX.read(evt.target.result, {type: 'binary'});
            const itemSheet = workbook.Sheets["Urun_Duzen_Ve_Siparis"];
            if(itemSheet) {
                const itemData = XLSX.utils.sheet_to_json(itemSheet);
                const orderMap = new Map();
                itemData.forEach(row => {
                    const kodu = String(row["STOK KODU"] || "").trim();
                    const sira = row["SIRA"];
                    const mSiparis = row["MANUEL_SIPARIS"] || 0;
                    if(kodu) {
                        orderMap.set(kodu, { sira: parseInt(sira), manuel: parseInt(mSiparis) });
                        manuelSiparisMap[kodu] = parseInt(mSiparis);
                    }
                });
                allData.sort((a, b) => {
                    const infoA = orderMap.get(a.stokKodu);
                    const infoB = orderMap.get(b.stokKodu);
                    return (infoA ? infoA.sira : 99999) - (infoB ? infoB.sira : 99999);
                });
                allData.forEach(item => {
                    const info = orderMap.get(item.stokKodu);
                    if(info) item.manuelSiparis = info.manuel;
                });
            }
            const slicerSheet = workbook.Sheets["Kategori_Siralamasi"];
            if(slicerSheet) {
                const slicerData = XLSX.utils.sheet_to_json(slicerSheet);
                const newSlicerMap = {};
                slicerData.forEach(row => {
                    if(!newSlicerMap[row.MARKA]) newSlicerMap[row.MARKA] = [];
                    newSlicerMap[row.MARKA].push(row.KATEGORI);
                });
                slicerOrderMap = newSlicerMap;
                localStorage.setItem('slicerOrderData', JSON.stringify(slicerOrderMap));
            }
            saveManuelSiparisMap();
            saveAndRender();
            alert("Tüm verileriniz başarıyla diğer bilgisayardan aktarıldı!");
        };
        reader.readAsBinaryString(file);
    });

    function saveAndRender() {
        localStorage.setItem('masterInventoryData', JSON.stringify(allData));
        initSlicers();
        renderTable();
    }

    function switchBrand(brand) {
        currentBrand = brand;
        currentFilter = 'HEPSİ';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${brand.toLowerCase()}`).classList.add('active');
        initSlicers();
        renderTable();
    }

    function initSlicers() {
        const container = document.getElementById('slicer-area');
        let rawCats = [...new Set(allData.filter(d => d.marka && d.marka.includes(currentBrand)).map(d => d.ozelKod5))];
        rawCats.sort((a, b) => a.localeCompare(b, 'tr', {numeric: true}));
        let categories = getOrderedCategories(currentBrand, rawCats);

        container.innerHTML = `<div class="slicer-btn ${currentFilter === 'HEPSİ' ? 'active' : ''}" onclick="filterCategory('HEPSİ')" data-cat="HEPSİ">HEPSİ</div>` +
        categories.map(cat => `<div class="slicer-btn ${currentFilter === cat ? 'active' : ''}" onclick="filterCategory('${cat}')" data-cat="${cat}" draggable="true" style="cursor:grab;">${cleanLabel(cat)}</div>`).join('') + 
        `<div class="search-container-in-slicer">
            <input type="text" id="search-input" class="search-input" placeholder="URUN ARA..." oninput="renderTable()">
            <button class="btn-customer-trigger" onclick="toggleCustomerDropdown(event)">👥 MÜŞTERİLER</button>
            <div id="customer-dropdown" class="customer-dropdown">
                <div class="cust-search-wrapper">
                    <input type="text" id="cust-search-input" class="cust-inner-search" placeholder="Müşteri veya Sipariş Ara..." oninput="filterCustomers()">
                </div>
                <div id="customer-list-area" class="customer-list-area"></div>
            </div>
        </div>`;

        let dragSrc = null;
        const btns = container.querySelectorAll('.slicer-btn[draggable="true"]');
        btns.forEach(btn => {
            btn.addEventListener('dragstart', function(e) { dragSrc = this; this.style.opacity = '0.5'; });
            btn.addEventListener('dragend', function() {
                this.style.opacity = '1';
                const newOrder = [...container.querySelectorAll('.slicer-btn[data-cat]')].map(b => b.getAttribute('data-cat')).filter(c => c !== 'HEPSİ');
                saveSlicerOrder(currentBrand, newOrder);
            });
            btn.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderStyle = 'dashed'; });
            btn.addEventListener('dragleave', function() { this.style.borderStyle = ''; });
            btn.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderStyle = '';
                if (dragSrc && dragSrc !== this) {
                    const allBtns = [...container.querySelectorAll('.slicer-btn[draggable="true"]')];
                    const srcIdx = allBtns.indexOf(dragSrc);
                    const tgtIdx = allBtns.indexOf(this);
                    if (srcIdx < tgtIdx) this.after(dragSrc);
                    else this.before(dragSrc);
                }
            });
        });
    }

    function toggleCustomerDropdown(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('customer-dropdown');
        dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
        if(dropdown.style.display === 'flex') {
            filterCustomers();
            document.getElementById('cust-search-input').focus();
        }
    }

    function filterCustomers() {
        const searchTerm = document.getElementById('cust-search-input').value.toLowerCase();
        const listArea = document.getElementById('customer-list-area');
        const customerSet = new Set();
        allData.forEach(item => {
            if(item.satisListesi) item.satisListesi.forEach(s => customerSet.add(s.musteri));
        });
        const filtered = Array.from(customerSet).filter(c => c.toLowerCase().includes(searchTerm)).sort();
        listArea.innerHTML = filtered.map(c => `
            <div class="customer-item">
                <span class="customer-name">${c}</span>
                <div class="cust-actions">
                    <button class="btn-cust-preview" onclick="previewCustomerList(event, '${c.replace(/'/g, "\\'")}')">ÖNİZLEME</button>
                    <button class="btn-cust-download" onclick="downloadCustomerList(event, '${c.replace(/'/g, "\\'")}')">İNDİR</button>
                </div>
            </div>
        `).join('') || '<div class="customer-item">Bulunamadı</div>';
    }

    function downloadCurrentSort() {
        const combinedData = allData.map((item, index) => ({
            "STOK KODU": item.stokKodu,
            "SIRA": index + 1,
            "MANUEL_SIPARIS": item.manuelSiparis || 0
        }));
        const slicerData = [];
        Object.keys(slicerOrderMap).forEach(brand => {
            slicerOrderMap[brand].forEach((cat, idx) => {
                slicerData.push({ "MARKA": brand, "KATEGORI": cat, "KAT_SIRA": idx + 1 });
            });
        });
        const wb = XLSX.utils.book_new();
        const wsItems = XLSX.utils.json_to_sheet(combinedData);
        XLSX.utils.book_append_sheet(wb, wsItems, "Urun_Duzen_Ve_Siparis");
        const wsSlicers = XLSX.utils.json_to_sheet(slicerData);
        XLSX.utils.book_append_sheet(wb, wsSlicers, "Kategori_Siralamasi");
        XLSX.writeFile(wb, `Sistem_Yedek_${new Date().toLocaleDateString()}.xlsx`);
        alert("Tüm değişiklikleriniz Excel olarak paketlendi.");
    }

    function previewCustomerList(e, custName) {
        if(e) e.stopPropagation();
        const previewBody = document.getElementById('preview-body');
        document.getElementById('preview-title').textContent = custName + "";
        let html = `<button class="btn-excel-cust-big" onclick="downloadCustomerList(null, '${custName.replace(/'/g, "\\'")}')">📥 LİSTEYİ EXCEL OLARAK İNDİR</button>`;
        html += `<table class="preview-table"><thead><tr><th>TARİH</th><th>KOD</th><th>AD</th><th>SİPARİŞ</th><th>FİİLİ</th><th>KALAN</th></tr></thead><tbody>`;
        let hasData = false;
        allData.forEach(item => {
            const customerOrders = item.satisListesi?.filter(s => s.musteri === custName);
            if(customerOrders && customerOrders.length > 0) {
                hasData = true;
                const totalAdet = customerOrders.reduce((sum, current) => sum + (parseInt(current.adet) || 0), 0);
                // Müşterinin o stok kodundaki ilk siparişinin tarihini alıyoruz
                const siparisTarihi = customerOrders[0].tarih || "-"; 
                html += `<tr><td>${siparisTarihi}</td><td>${item.stokKodu}</td><td>${item.stokAdi}</td><td style="color:red">${totalAdet}</td><td>${item.fiili}</td><td style="color:blue">${item.kalan}</td></tr>`;
            }
        });
        html += `</tbody></table>`;
        previewBody.innerHTML = hasData ? html : '<p>Sipariş bulunamadı.</p>';
        document.getElementById('preview-modal').style.display = 'flex';
        document.getElementById('customer-dropdown').style.display = 'none'; 
    }

    function downloadCustomerList(e, custName) {
        if(e) e.stopPropagation();
        const list = [];
        allData.forEach(item => {
            const orders = item.satisListesi?.filter(s => s.musteri === custName);
            if(orders && orders.length > 0) {
                const totalAdet = orders.reduce((sum, current) => sum + (parseInt(current.adet) || 0), 0);
                list.push({ "TARİH": orders[0].tarih || "-", "KOD": item.stokKodu, "AD": item.stokAdi, "SİPARİŞ": totalAdet, "FİİLİ": item.fiili, "KALAN": item.kalan });
            }
        });
        if(list.length > 0) {
            const ws = XLSX.utils.json_to_sheet(list);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Siparis");
            XLSX.writeFile(wb, `${custName}_Siparis.xlsx`);
        }
    }

    document.addEventListener('click', (e) => {
        const dd = document.getElementById('customer-dropdown');
        if(dd && !dd.contains(e.target)) dd.style.display = 'none';
    });

    function filterCategory(cat) {
        currentFilter = cat;
        initSlicers();
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');
        const slug = (t) => t ? t.replace(/İ/g, "i").replace(/I/g, "ı").toLowerCase() : "";
        const searchTerm = searchInput ? slug(searchInput.value) : "";
        let filtered = allData.filter(d => {
            const mb = d.marka && d.marka.includes(currentBrand);
            const ms = slug(d.stokKodu).includes(searchTerm) || slug(d.stokAdi).includes(searchTerm);
            return searchTerm !== "" ? (mb && ms) : (mb && (currentFilter === 'HEPSİ' || d.ozelKod5 === currentFilter));
        });
        tbody.innerHTML = filtered.map(item => {
            const omurVal = parseFloat(item.stokOmru);
            const omurSimge = omurVal < 5 ? '⚠️' : '✅';
            return `<tr data-id="${item.stokKodu}" class="${item.kalan <= 0 ? 'critical-row' : ''}">
                <td class="w-sort">::</td>
                <td>${item.stokKodu}</td>
                <td class="col-stok-adi" onclick="showDetail('${item.stokKodu}')">${item.stokAdi}</td>
                <td>${formatCurrency(item.fiyat)}</td>
                <td class="col-fiili">${item.fiili}</td>
                <td class="col-satis">${item.satis}</td>
                <td class="col-kalan">${item.kalan}</td>
                <td class="col-ithalat">${item.ithalat}</td>
                <td class="col-manuel" onclick="editManuelSiparis(this, '${item.stokKodu}')">${item.manuelSiparis || 0}</td>
                <td class="col-avg">${item.avgSatis ? item.avgSatis.toFixed(2) : '0.00'}</td>
                <td class="col-omur">${item.stokOmru} Ay ${omurSimge}</td>
                <td class="col-oneri" style="color:${item.ihtiyacAdet > 0 ? 'red' : 'green'}">${item.ihtiyacAdet} Adet</td>
                <td class="col-stok-durumu" style="color:${item.stokDurumuRenk}">${item.stokDurumu || "DİĞER"}</td>
            </tr>`;
        }).join('');
        if(sortableRows) sortableRows.destroy();
        sortableRows = new Sortable(tbody, { 
            animation: 150, handle: '.w-sort',
            onEnd: function() {
                const newOrderIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.getAttribute('data-id'));
                const sortedData = [];
                newOrderIds.forEach(id => {
                    const found = allData.find(d => d.stokKodu === id);
                    if(found) sortedData.push(found);
                });
                allData.forEach(item => { if(!newOrderIds.includes(item.stokKodu)) sortedData.push(item); });
                allData = sortedData;
                localStorage.setItem('masterInventoryData', JSON.stringify(allData));
            }
        });
    }

    function showDetail(stokKodu) {
        const item = allData.find(d => d.stokKodu === stokKodu);
        if(!item) return;
        const totalReserved = item.satisListesi ? item.satisListesi.reduce((sum, s) => sum + (parseInt(s.adet) || 0), 0) : 0;
        const kalanRenk = item.kalan > 0 ? "#00a859" : "#ff0000"; 
        let depoHtml = "";
        const depolar = [{ isim: "ÖMERLİ", adet: item.depoL }, { isim: "SHOWROOM", adet: item.depoN }, { isim: "ŞİRKET", adet: item.depoO }, { isim: "TAMİR", adet: item.depoP }];
        depolar.forEach(depo => { if (parseInt(depo.adet) > 0) depoHtml += `<div style="font-size: 10px; color: #555; padding-left: 10px; border-bottom: 1px dashed #eee;">• ${depo.isim}: <strong>${depo.adet} Adet</strong></div>`; });

        document.getElementById('modal-title').textContent = item.stokKodu + " - " + item.stokAdi;
        let bodyHtml = item.resim ? `<img src="${item.resim}" class="product-image" onerror="this.style.display='none'">` : '';
        bodyHtml += `<div class="modal-section"><h4>📊 ANALİZ ÖZETİ (${item.avgSatis?.toFixed(2)})</h4>
            <div class="info-row" style="color:${item.stokDurumuRenk}"><strong>Durum:</strong> ${item.stokDurumu}</div>
            <div class="info-row" style="color:${kalanRenk}"><strong>SATILABİLİR STOK:</strong> ${item.kalan}</div>
            <div class="info-row" style="color:#2980b9"><strong>SİPARİŞ:</strong> ${item.manuelSiparis || 0}</div>
            ${depoHtml}
        </div>`;
        bodyHtml += `<div class="modal-section"><h4>📦 GELECEK ÜRÜNLER (${item.ithalat})</h4>`;
        if(item.ithalatDetay) item.ithalatDetay.split('\n').forEach(line => bodyHtml += `<div class="info-row" style="color:#00a859">✔ ${line}</div>`);
        else bodyHtml += `<div class="info-row" style="color:#999">Gelecek ürün yok.</div>`;
        bodyHtml += `</div>`;

        bodyHtml += `<div class="modal-section"><h4>👥 SİPARİŞLER (${totalReserved})</h4>`;
        if(item.satisListesi && item.satisListesi.length > 0) {
            item.satisListesi.forEach(s => {
                // J sütunundaki müşterinin yanına C sütunundaki tarih parantez içinde eklendi
                bodyHtml += `<div class="info-row" style="color:#d35400">✔ ${s.adet} Adet - <span class="cust-link" onclick="previewCustomerList(null, '${s.musteri.replace(/'/g, "\\'")}')">${s.musteri}</span> (${s.tarih || "-"})</div>`;
            });
        } else bodyHtml += `<div class="info-row" style="color:#999">Sipariş yok.</div>`;
        bodyHtml += `</div>`;

        document.getElementById('modal-body').innerHTML = bodyHtml;
        document.getElementById('info-modal').style.display = 'flex';
    }

    function closeModal(e, id) { if(e.target.id === id) document.getElementById(id).style.display = 'none'; }
    function downloadReport() { document.getElementById('brand-select-modal').style.display = 'flex'; }
    function closeBrandModal(marka) { document.getElementById('brand-select-modal').style.display = 'none'; downloadReportForBrand(marka); }

    function downloadReportForBrand(secilenMarka) {
        if (!allData || allData.length === 0) return alert("Veri yok!");
        const header = ["STOK KODU", "STOK ADI", "MARKA", "KATEGORİ", "FİYAT", "FİİLİ STOK", "SATIŞ", "KALAN", "İTHALAT", "MANUEL SİPARİŞ", "AYLIK ORT.", "STOK ÖMRÜ (AY)", "SİPARİŞ ÖNERİSİ", "STOK DURUMU", "İTHALAT DETAY"];
        function itemToRow(it) { return [it.stokKodu, it.stokAdi, it.marka, it.ozelKod5, it.fiyat, it.fiili, it.satis, it.kalan, it.ithalat, it.manuelSiparis || 0, it.avgSatis ? parseFloat(it.avgSatis.toFixed(2)) : 0, it.stokOmru, it.ihtiyacAdet, it.stokDurumu, it.ithalatDetay || '']; }
        const wb = XLSX.utils.book_new();
        const usedNames = new Set();
        function uniqueName(base) { let name = base; let c = 2; while (usedNames.has(name)) { name = base.substring(0, 28) + c++; } usedNames.add(name); return name; }
        
        [secilenMarka].forEach(brand => {
            const brandData = allData.filter(d => d.marka && d.marka.includes(brand));
            if (brandData.length === 0) return;
            const wsAll = XLSX.utils.aoa_to_sheet([header, ...brandData.map(itemToRow)]);
            XLSX.utils.book_append_sheet(wb, wsAll, uniqueName(brand === 'PROFORCE' ? 'PRO-TÜM' : 'PAN-TÜM'));
            const categories = [...new Set(brandData.map(d => d.ozelKod5).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'tr', {numeric: true}));
            categories.forEach(cat => {
                const catData = brandData.filter(d => d.ozelKod5 === cat);
                if (catData.length === 0) return;
                const ws = XLSX.utils.aoa_to_sheet([header, ...catData.map(itemToRow)]);
                XLSX.utils.book_append_sheet(wb, ws, uniqueName(cat.replace(/^\d+-/, '').substring(0, 31)));
            });
        });
        XLSX.writeFile(wb, `Analiz_Raporu_${new Date().toLocaleDateString('tr-TR')}.xlsx`);
    }
</script>

<div id="brand-select-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; border-radius:10px; padding:30px; text-align:center; box-shadow:0 5px 20px rgba(0,0,0,0.3); min-width:280px;">
        <div style="font-size:14px; font-weight:bold; margin-bottom:20px;">Hangi markanın raporunu indirmek istiyorsunuz?</div>

            <button onclick="closeBrandModal('PROFORCE')" style="background:#00a859; color:white; border:none; padding:10px 24px; border-radius:6px; font-weight:bold; font-size:13px; cursor:pointer;">PROFORCE</button>
            <button onclick="closeBrandModal('PANATTA')" style="background:#ff0000; color:white; border:none; padding:10px 24px; border-radius:6px; font-weight:bold; font-size:13px; cursor:pointer;">PANATTA</button>
        </div>
        <div style="margin-top:12px;"><button onclick="document.getElementById('brand-select-modal').style.display='none'" style="background:#eee; border:none; padding:6px 16px; border-radius:6px; cursor:pointer; font-size:11px;">İptal</button></div>
    </div>
</div>
